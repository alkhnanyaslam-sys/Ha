name: 🕋 Quran Stream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: 🖼 Convert Images to Video
        run: |
          # دالة تتحقق من صحة PNG
          is_valid_png() {
            local f="$1"
            [ -f "$f" ] && [ "$(wc -c < "$f")" -gt 100 ] && \
            python3 -c "
import sys
with open(sys.argv[1],'rb') as f:
    sig = f.read(8)
    sys.exit(0 if sig == b'\x89PNG\r\n\x1a\n' else 1)
" "$f" 2>/dev/null
          }

          # دالة تحويل صورة أو شاشة سوداء كبديل
          convert_img() {
            local base="$1"
            # جرب حروف صغيرة وكبيرة
            local PNG=""
            for candidate in "${base}.png" "${base^}.png"; do
              if is_valid_png "$candidate"; then
                PNG="$candidate"
                break
              fi
            done

            if [ -n "$PNG" ]; then
              echo "✅ تحويل $PNG → ${base}.mp4"
              ffmpeg -y -loop 1 -i "$PNG" -t 10 \
                -c:v libx264 -preset ultrafast \
                -vf "scale=1280:720,fps=25" \
                -pix_fmt yuv420p -an "${base}.mp4" \
                && echo "✅ ${base}.mp4 جاهز" \
                || { echo "⚠️ فشل — شاشة سوداء بديلة";
                     ffmpeg -y -f lavfi -i color=black:s=1280x720:r=25 -t 10 \
                       -c:v libx264 -preset ultrafast -pix_fmt yuv420p \
                       -an "${base}.mp4"; }
            else
              echo "⚠️ ${base}.png غير موجود أو تالف — شاشة سوداء"
              ffmpeg -y -f lavfi -i color=black:s=1280x720:r=25 -t 10 \
                -c:v libx264 -preset ultrafast -pix_fmt yuv420p \
                -an "${base}.mp4"
            fi
          }

          for img in mecca madina cairo dosari abdulbasit minshawi \
                     qatami hussary muaiqly alafasy; do
            convert_img "$img"
          done

          echo "--- الملفات المنتجة ---"
          ls -lh *.mp4 2>/dev/null || echo "لا توجد ملفات mp4"

      - name: 🕋 Start Quran Stream
        env:
          BOT_TOKEN:        ${{ secrets.BOT_TOKEN }}
          ADMIN_ID:         ${{ secrets.ADMIN_ID }}
          CHANNEL_1_RTMP:   ${{ secrets.CHANNEL_1_RTMP }}
          CHANNEL_1_KEY:    ${{ secrets.CHANNEL_1_KEY }}
          CHANNEL_1_SOURCE: ${{ secrets.CHANNEL_1_SOURCE }}
          CHANNEL_2_RTMP:   ${{ secrets.CHANNEL_2_RTMP }}
          CHANNEL_2_KEY:    ${{ secrets.CHANNEL_2_KEY }}
          CHANNEL_2_SOURCE: ${{ secrets.CHANNEL_2_SOURCE }}
          CHANNEL_3_RTMP:   ${{ secrets.CHANNEL_3_RTMP }}
          CHANNEL_3_KEY:    ${{ secrets.CHANNEL_3_KEY }}
          CHANNEL_3_SOURCE: ${{ secrets.CHANNEL_3_SOURCE }}
          CHANNEL_4_RTMP:   ${{ secrets.CHANNEL_4_RTMP }}
          CHANNEL_4_KEY:    ${{ secrets.CHANNEL_4_KEY }}
          CHANNEL_4_SOURCE: ${{ secrets.CHANNEL_4_SOURCE }}
          CHANNEL_5_RTMP:   ${{ secrets.CHANNEL_5_RTMP }}
          CHANNEL_5_KEY:    ${{ secrets.CHANNEL_5_KEY }}
          CHANNEL_5_SOURCE: ${{ secrets.CHANNEL_5_SOURCE }}
          CHANNEL_6_RTMP:   ${{ secrets.CHANNEL_6_RTMP }}
          CHANNEL_6_KEY:    ${{ secrets.CHANNEL_6_KEY }}
          CHANNEL_6_SOURCE: ${{ secrets.CHANNEL_6_SOURCE }}
        run: node bot.js


