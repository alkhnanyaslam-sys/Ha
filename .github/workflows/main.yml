name: 🕋 Quran Stream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: 📦 Cache Quran audio
        uses: actions/cache@v4
        with:
          path: |
            /tmp/qcache_dosari
            /tmp/qcache_abdulbasit
            /tmp/qcache_minshawi
            /tmp/qcache_qatami
            /tmp/qcache_hussary
            /tmp/qcache_muaiqly
            /tmp/qcache_alafasy
            /tmp/bad_surahs_dosari.json
            /tmp/bad_surahs_abdulbasit.json
            /tmp/bad_surahs_minshawi.json
            /tmp/bad_surahs_qatami.json
            /tmp/bad_surahs_hussary.json
            /tmp/bad_surahs_muaiqly.json
            /tmp/bad_surahs_alafasy.json
          key: quran-audio-cache-v1

      - name: 🖼 Convert Images to Video
        run: |
          for name in mecca madina cairo dosari abdulbasit minshawi qatami hussary muaiqly alafasy; do
            PNG="${name}.png"
            OUT="${name}.mp4"
            SIZE=0
            if [ -f "$PNG" ]; then SIZE=$(stat -c%s "$PNG"); fi
            if [ "$SIZE" -gt 1000 ]; then
              ffmpeg -y -loop 1 -i "$PNG" -t 10 -c:v libx264 -preset ultrafast -vf "scale=1280:720,fps=25" -pix_fmt yuv420p -an "$OUT" > /dev/null 2>&1 && echo "✅ $OUT" || ffmpeg -y -f lavfi -i color=black:s=1280x720:r=25 -t 10 -c:v libx264 -preset ultrafast -pix_fmt yuv420p -an "$OUT" > /dev/null 2>&1
            else
              ffmpeg -y -f lavfi -i color=black:s=1280x720:r=25 -t 10 -c:v libx264 -preset ultrafast -pix_fmt yuv420p -an "$OUT" > /dev/null 2>&1
            fi
          done
          ls -lh *.mp4

      - name: 🕋 Start Quran Stream
        env:
          BOT_TOKEN:        ${{ secrets.BOT_TOKEN }}
          ADMIN_ID:         ${{ secrets.ADMIN_ID }}
          CHANNEL_1_RTMP:   ${{ secrets.CHANNEL_1_RTMP }}
          CHANNEL_1_KEY:    ${{ secrets.CHANNEL_1_KEY }}
          CHANNEL_1_SOURCE: ${{ secrets.CHANNEL_1_SOURCE }}
          CHANNEL_2_RTMP:   ${{ secrets.CHANNEL_2_RTMP }}
          CHANNEL_2_KEY:    ${{ secrets.CHANNEL_2_KEY }}
          CHANNEL_2_SOURCE: ${{ secrets.CHANNEL_2_SOURCE }}
          CHANNEL_3_RTMP:   ${{ secrets.CHANNEL_3_RTMP }}
          CHANNEL_3_KEY:    ${{ secrets.CHANNEL_3_KEY }}
          CHANNEL_3_SOURCE: ${{ secrets.CHANNEL_3_SOURCE }}
          CHANNEL_4_RTMP:   ${{ secrets.CHANNEL_4_RTMP }}
          CHANNEL_4_KEY:    ${{ secrets.CHANNEL_4_KEY }}
          CHANNEL_4_SOURCE: ${{ secrets.CHANNEL_4_SOURCE }}
          CHANNEL_5_RTMP:   ${{ secrets.CHANNEL_5_RTMP }}
          CHANNEL_5_KEY:    ${{ secrets.CHANNEL_5_KEY }}
          CHANNEL_5_SOURCE: ${{ secrets.CHANNEL_5_SOURCE }}
          CHANNEL_6_RTMP:   ${{ secrets.CHANNEL_6_RTMP }}
          CHANNEL_6_KEY:    ${{ secrets.CHANNEL_6_KEY }}
          CHANNEL_6_SOURCE: ${{ secrets.CHANNEL_6_SOURCE }}
        run: node bot.js
